kind = "mobile"
previewPath = "/"
title = "Sinolingua Guide"
version = "1.0.0"
id = "artifacts/sinolingua-guide"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23084

[services.development]
run = "pnpm --filter @workspace/sinolingua-guide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sinolingua-guide", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/sinolingua-guide", "run", "serve" ]

[services.env]
PORT = "23084"
BASE_PATH = "/"
